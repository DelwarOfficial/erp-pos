# Playwright Configuration
# Per §8 testing requirements: Playwright (e2e)

[webServer]
command = "bun run dev"
port = 3000
timeout = 30_000
reuseExistingServer = true

[baseUrl]
url = "http://localhost:3000"

[testDir]
dir = "tests/e2e"

[outputDir]
dir = "test-results"

[reporter]
name = "html"
outputDir = "playwright-report"

[use]
headless = true
viewport = { width = 1280, height = 720 }
locale = "en-US"
timezone = "Asia/Dhaka"
actionTimeout = 10_000
navigationTimeout = 15_000
screenshot = "only-on-failure"
video = "retain-on-failure"
trace = "retain-on-failure"

[projects]
# Desktop Chrome
[projects.desktop]
name = "Desktop Chrome"
use = { browser = "chromium" }

# Mobile emulation (responsive testing)
[projects.mobile]
name = "Mobile Safari"
use = { browser = "webkit", viewport = { width = 390, height = 844 }, deviceScaleFactor = 3, isMobile = true, hasTouch = true }
