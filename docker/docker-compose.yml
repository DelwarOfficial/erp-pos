# docker/docker-compose.yml
# Local development: PostgreSQL 16, Redis, MinIO (S3-compatible)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_pos
      POSTGRES_USER: app_role
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_password_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sql:/docker-entrypoint-initdb.d/init-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_role -d erp_pos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://app_role:${APP_DB_PASSWORD:-app_password_dev}@postgres:5432/erp_pos?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-encryption-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://app_role:${APP_DB_PASSWORD:-app_password_dev}@postgres:5432/erp_pos?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
